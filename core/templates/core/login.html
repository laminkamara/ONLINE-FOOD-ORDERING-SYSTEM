{% extends 'core/base.html' %}

{% block title %}Login - yoni Fast Food Restaurant{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-75">
        <div class="col-lg-5 col-md-7">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <!-- Header -->
                <div class="card-header bg-primary text-white text-center py-4" style="background: linear-gradient(135deg, #6a1b9a 0%, #2196f3 100%);">
                    <i class="fas fa-user-circle fa-3x mb-2"></i>
                    <h3 class="fw-bold mb-0">Welcome Back!</h3>
                    <p class="mb-0 mt-2 opacity-75">Login to continue ordering delicious food</p>
                </div>
                
                <!-- Body -->
                <div class="card-body p-5">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="username" class="form-label fw-semibold">
                                <i class="fas fa-user me-2"></i>Username
                            </label>
                            <input type="text" class="form-control form-control-lg rounded-3" id="username" name="username" placeholder="Enter your username" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="fas fa-lock me-2"></i>Password
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg rounded-start-3" id="password" name="password" placeholder="Enter your password" required>
                                <button class="btn btn-outline-secondary rounded-end-3" type="button" onclick="togglePassword()">
                                    <i class="fas fa-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-start align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                                <label class="form-check-label" for="remember">
                                    Remember me
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>
                </div>
                
                <!-- Footer -->
                <div class="card-footer bg-light text-center py-4">
                    <p class="mb-0">Don't have an account? 
                        <a href="{% url 'register' %}" class="fw-bold text-primary text-decoration-none">Sign Up Now</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
